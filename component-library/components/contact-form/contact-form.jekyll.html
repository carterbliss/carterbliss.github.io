<!-- begin contact -->
{% assign c = "c-contact-form" %}
<div class="{{c}}" id="contact">
  <div class="container">
    <div class="row">
      <div class="col col-12">

        <div class="{{c}}__form-box">
          <div class="{{c}}__contact-head">
            <h2 class="{{c}}__contact-title">{{ include.form_title }}</h2>
          </div>
          <form class="{{c}}__form" id="contact-form">
            <div class="{{c}}__form-group">
              <label class="{{c}}__form-label screen-reader-text" for="form-name">Your Name</label>
              <input class="{{c}}__form-input" id="form-name" type="text" placeholder="Your name..." required>
            </div>
            <div class="{{c}}__form-group">
              <label class="{{c}}__form-label screen-reader-text" for="form-email">Your Email</label>
              <input class="{{c}}__form-input" id="form-email" type="email" placeholder="Your email..." required>
            </div>
            <div class="{{c}}__form-group">
              <label class="{{c}}__form-label screen-reader-text" for="form-text">Your Message</label>
              <textarea class="{{c}}__form-input" id="form-text" rows="9" placeholder="Your message..." required></textarea>
            </div>
            <div class="{{c}}__form-group {{c}}__form-group--button">
              <button class="c-button c-button--primary c-button--large" type="submit" id="contact-submit">{{ include.form_button_text }}</button>
              <span class="{{c}}__sent" id="contact-sent" style="display:none;">Sent ✓</span>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e) {
  e.preventDefault();

  var name    = document.getElementById('form-name').value.trim();
  var email   = document.getElementById('form-email').value.trim();
  var message = document.getElementById('form-text').value.trim();
  var btn     = document.getElementById('contact-submit');

  btn.disabled = true;

  fetch('https://formspree.io/f/YOUR_FORM_ID', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ name: name, email: email, message: message })
  })
  .then(function(res) {
    if (res.ok) {
      document.getElementById('contact-sent').style.display = 'inline';
      document.getElementById('contact-form').reset();
    } else {
      alert('Something went wrong. Please try again.');
    }
  })
  .catch(function() {
    alert('Something went wrong. Please try again.');
  })
  .finally(function() {
    btn.disabled = false;
  });
});
</script>
<!-- end contact -->
